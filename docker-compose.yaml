version: '3.8'
services:
  # 1. Database Relational (MySQL)
  mysql:
    image: mysql:8.0
    container_name: dev_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: devsecops_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql # Lưu dữ liệu MySQL ra ngoài để không bị mất khi container dừng

  # 2. GUI quản lý database
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dev_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql

  # 3. Caching (Redis)
  redis:
    image: redis:alpine
    container_name: dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. Backend Node.js API (Chạy dạng Hot-reload cho Local)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dev_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - DB_NAME=devsecops_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app          # Map code từ máy thật vào container
      - /app/node_modules       # Giữ node_modules riêng trong container
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data: